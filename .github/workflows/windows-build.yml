name: Windows Build

# Runs on every push to main, on every version tag (v1.0.0 etc.), and can
# also be triggered manually from the Actions tab ("Run workflow" button).
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-windows:
    # Pinned to windows-2022 (not windows-latest): as of June 2026,
    # windows-latest points to Visual Studio 2026, whose stricter compiler
    # hard-errors on deprecated "experimental coroutine" C++ headers that
    # permission_handler_windows (and several other Flutter Windows
    # plugins) still use internally. windows-2022 keeps the older,
    # working MSVC toolchain and remains officially supported by GitHub.
    # Revisit/remove this pin once the plugin ecosystem catches up.
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable Windows Defender real-time scanning
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Pin this once you know which Flutter version you develop with
          # locally, e.g. flutter-version: '3.32.0', so CI never drifts
          # from your machine.
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons (Android/iOS/Windows)
        run: dart run flutter_launcher_icons

      - name: Run analyzer
        run: flutter analyze
        continue-on-error: true

      - name: Build Windows release
        run: flutter build windows --release

      # The Release build lands in build/windows/x64/runner/Release
      # (folder name is build/windows/runner/Release on older Flutter).
      - name: Locate build output
        id: locate
        shell: pwsh
        run: |
          $path = "build\windows\x64\runner\Release"
          if (-not (Test-Path $path)) { $path = "build\windows\runner\Release" }
          echo "release_dir=$path" >> $env:GITHUB_OUTPUT

      - name: Zip the portable build
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.locate.outputs.release_dir }}\*" -DestinationPath "LANShare-windows-portable.zip"

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LANShare-windows-portable
          path: LANShare-windows-portable.zip

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $absoluteReleaseDir = (Resolve-Path "${{ steps.locate.outputs.release_dir }}").Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppReleaseDir="$absoluteReleaseDir" `
            installer\setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LANShare-windows-installer
          path: installer\Output\*.exe

      # When the workflow was triggered by a version tag (e.g. v1.2.0),
      # also publish both files as a GitHub Release automatically.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LANShare-windows-portable.zip
            installer\Output\*.exe
