name: Desktop Builds

on:
  push:
    branches: ["main"]
    tags: ["v*"]

  pull_request:
    branches: ["main"]

  workflow_dispatch: {}

jobs:

  # ==========================
  # WINDOWS BUILD
  # ==========================
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Disable Windows Defender
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true


      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true


      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop


      - name: Install dependencies
        run: flutter pub get


      - name: Generate icons
        run: dart run flutter_launcher_icons


      - name: Build Windows
        run: flutter build windows --release


      - name: Locate Windows build
        id: win
        shell: pwsh
        run: |
          $path="build\windows\x64\runner\Release"

          if (!(Test-Path $path)) {
            $path="build\windows\runner\Release"
          }

          echo "release=$path" >> $env:GITHUB_OUTPUT


      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive `
          -Path "${{ steps.win.outputs.release }}\*" `
          -DestinationPath LANShare-windows-portable.zip


      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: LANShare-windows-portable
          path: LANShare-windows-portable.zip


      - name: Install Inno Setup
        run: choco install innosetup -y


      - name: Build Windows installer
        shell: pwsh
        run: |
          $dir=(Resolve-Path "${{ steps.win.outputs.release }}").Path

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
          /DMyAppReleaseDir="$dir" `
          installer\setup.iss


      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LANShare-windows-installer
          path: installer\Output\*.exe



  # ==========================
  # UBUNTU BUILD
  # ==========================
  build-ubuntu:

    runs-on: ubuntu-22.04
    timeout-minutes: 20


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            dpkg-dev


      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true


      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop


      - name: Install dependencies
        run: flutter pub get


      - name: Generate icons
        run: dart run flutter_launcher_icons


      - name: Build Linux
        run: flutter build linux --release



      # Portable Ubuntu build
      - name: Create portable archive
        run: |
          tar -czf LANShare-linux-portable.tar.gz \
          -C build/linux/x64/release bundle



      - name: Upload Linux portable
        uses: actions/upload-artifact@v4
        with:
          name: LANShare-linux-portable
          path: LANShare-linux-portable.tar.gz



      # Debian installer
      - name: Create Debian package
        shell: bash
        run: |

          mkdir -p package/usr/local/LANShare
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/256x256/apps
          mkdir -p package/DEBIAN


          cp -r build/linux/x64/release/bundle/* \
          package/usr/local/LANShare/


          cp assets/icon/icon.png \
          package/usr/share/icons/hicolor/256x256/apps/lanshare.png



          cat > package/usr/share/applications/lanshare.desktop <<EOF
          [Desktop Entry]
          Name=LANShare
          Comment=Share clipboard text and files over LAN
          Exec=/usr/local/LANShare/lanshare
          Icon=lanshare
          Terminal=false
          Type=Application
          Categories=Network;
          EOF



          cat > package/DEBIAN/control <<EOF
          Package: lanshare
          Version: 1.0.0
          Architecture: amd64
          Maintainer: LANShare
          Description: Share clipboard text and files over LAN
          Depends: libgtk-3-0
          EOF



          dpkg-deb --build package LANShare-linux-installer.deb



      - name: Upload Debian installer
        uses: actions/upload-artifact@v4
        with:
          name: LANShare-linux-installer
          path: LANShare-linux-installer.deb



  # ==========================
  # ANDROID BUILD
  # ==========================
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'


      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true


      - name: Install dependencies
        run: flutter pub get


      - name: Generate icons
        run: dart run flutter_launcher_icons


      - name: Decode keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/lanshare-release-key.jks


      - name: Create key.properties
        shell: bash
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=lanshare-release-key.jks
          EOF


      - name: Build APK
        run: flutter build apk --release


      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk LANShare-android.apk


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LANShare-android-apk
          path: LANShare-android.apk



  # ==========================
  # RELEASE
  # ==========================
  create-release:

    needs:
      - build-windows
      - build-ubuntu
      - build-android

    if: startsWith(github.ref,'refs/tags/v')

    runs-on: ubuntu-latest


    steps:

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: LANShare-windows-portable


      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: LANShare-windows-installer


      - name: Download Linux portable
        uses: actions/download-artifact@v4
        with:
          name: LANShare-linux-portable


      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: LANShare-linux-installer


      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: LANShare-android-apk


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

          files: |
            LANShare-windows-portable.zip
            *.exe
            LANShare-linux-portable.tar.gz
            LANShare-linux-installer.deb
            LANShare-android.apk
