name: lanshare
description: Share clipboard text and files between two devices on the same LAN using raw TCP sockets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: 10.3.8
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  desktop_drop: ^0.7.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png


# Generates launcher icons for:
# - Android
# - Windows
# - Linux
#
# Run:
# dart run flutter_launcher_icons
#
flutter_launcher_icons:
  android: true
  ios: false

  image_path: "assets/icon/icon.png"

  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#3F51B5"

  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

  linux:
    generate: true
    image_path: "assets/icon/icon.png"
